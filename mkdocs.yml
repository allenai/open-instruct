site_name: Open Instruct
site_url: https://github.com/allenai/open-instruct
theme:
  favicon: assets/favicon.ico
  name: material
  features:
    # - navigation.instant
    - navigation.tracking
    # - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: ai2-dark
      primary: custom
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: ai2
      primary: custom
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
#adding git repo
repo_url: https://github.com/allenai/open-instruct
repo_name: allenai/open-instruct
# Many docs link to source files (../../open_instruct/..., ../../scripts/...) that live
# outside the docs/ tree. Those links resolve correctly when the docs are viewed on
# GitHub, but mkdocs cannot validate targets outside docs_dir, so don't warn on them.
validation:
  links:
    not_found: ignore
    unrecognized_links: ignore
#markdown_extensions
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - abbr
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  # - toc:
  #     permalink: true
  # - markdown.extensions.codehilite:
  #     guess_lang: false
  # - admonition
  # - codehilite
  # - extra
  # - pymdownx.superfences:
  #     custom_fences:
  #     - name: mermaid
  #       class: mermaid
  #       format: !!python/name:pymdownx.superfences.fence_code_format ''
  # - pymdownx.tabbed


