name: PR Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  changelog:
    name: CHANGELOG
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate changelog entry in PR body
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        if echo "$PR_BODY" | grep -q 'CHANGELOG='; then
          REASON=$(echo "$PR_BODY" | grep -oP 'CHANGELOG=\K[^\n\r]*' | head -1)
          echo "CHANGELOG check bypassed. Reason: $REASON"
          exit 0
        fi

        if ! git diff --name-only "$(git merge-base origin/main HEAD)" | grep -q '^open_instruct/'; then
          echo "No open_instruct/ changes detected, skipping CHANGELOG check"
          exit 0
        fi

        CHANGELOG_SECTION=$(echo "$PR_BODY" | awk '/^## Changelog/{found=1; next} /^## /{if(found) exit} found{print}')

        if [ -z "$CHANGELOG_SECTION" ]; then
          echo "ERROR: No '## Changelog' section found in PR body."
          echo "Please add a changelog entry or CHANGELOG=<reason> to bypass."
          exit 1
        fi

        TYPE=$(echo "$CHANGELOG_SECTION" | grep -oiP '\*\*Type:\*\*\s*\K\w+' | head -1 | tr '[:upper:]' '[:lower:]')
        if [ -z "$TYPE" ]; then
          echo "ERROR: No '**Type:**' line found in the Changelog section."
          echo "Valid types: added, changed, deprecated, fixed"
          exit 1
        fi

        if ! echo "$TYPE" | grep -qP '^(added|changed|deprecated|fixed)$'; then
          echo "ERROR: Invalid changelog type '$TYPE'."
          echo "Valid types: added, changed, deprecated, fixed"
          exit 1
        fi

        ENTRY=$(echo "$CHANGELOG_SECTION" | grep -v '^\*\*Type:\*\*' | grep -v '^<!--' | grep -v '^-->' | grep -v '^\s*$' | head -1)
        if [ -z "$ENTRY" ]; then
          echo "ERROR: Changelog section has a type but no entry text."
          exit 1
        fi

        echo "Valid changelog entry found:"
        echo "  Type: $TYPE"
        echo "  Entry: $ENTRY"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.8.8"

    - name: Style check
      run: make style-check

    - name: Quality check
      run: make quality-check
