name: PR Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  changelog:
    name: CHANGELOG
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for changelog fragment
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        if echo "$PR_BODY" | grep -q 'CHANGELOG='; then
          REASON=$(echo "$PR_BODY" | grep -oP 'CHANGELOG=\K[^\n\r]*' | head -1)
          echo "CHANGELOG check bypassed. Reason: $REASON"
          exit 0
        fi

        if ! git diff --name-only $(git merge-base origin/main HEAD) | grep -q '^open_instruct/'; then
          echo "No open_instruct/ changes detected, skipping CHANGELOG check"
          exit 0
        fi

        FRAGMENTS=$(git diff --name-only $(git merge-base origin/main HEAD) | grep '^changelog.d/' | grep -v '.gitkeep' || true)
        if [ -z "$FRAGMENTS" ]; then
          echo "ERROR: Changes to open_instruct/ detected but no changelog fragment found."
          echo "Please add a file to changelog.d/ named <PR#>.<type> (e.g. ${PR_NUMBER}.added)"
          echo "Valid types: added, changed, deprecated, fixed"
          exit 1
        fi

        echo "Found changelog fragment(s):"
        echo "$FRAGMENTS"
        echo "Thanks for helping keep our CHANGELOG up-to-date!"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.8.8"

    - name: Style check
      run: make style-check

    - name: Quality check
      run: make quality-check
