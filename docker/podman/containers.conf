[containers]
netns="private"
userns="auto:size=1024"
ipcns="host"
utsns="host"
cgroupns="host"
cgroups="disabled"
keyring=false
log_driver = "k8s-file"
volumes = [
        "/proc:/proc",
]
default_sysctls = []
[network]
default_rootless_network_cmd = "slirp4netns"
[engine]
cgroup_manager = "cgroupfs"
events_logger="file"
num_locks = 8192
runtime="crun"
